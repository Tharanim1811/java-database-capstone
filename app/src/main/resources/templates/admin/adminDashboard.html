<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}"
          href="/assets/images/logo/logo.png">
    <title>Admin Dashboard | Clinic CMS</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" href="/assets/css/style.css">
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}"
          href="/assets/css/adminDashboard.css">
    <script th:src="@{/js/util.js}" src="/js/util.js" defer></script>
    <script th:src="@{/js/render.js}" src="/js/render.js" defer></script>
    <script th:src="@{/js/components/header.js}" src="/js/components/header.js" defer></script>
    <script type="module" th:src="@{/js/adminDashboard.js}" src="/js/adminDashboard.js"></script>
</head>
<body>
<div class="page-shell">
    <div id="header"></div>

    <main class="dashboard-main">
        <section class="dashboard-hero">
            <div>
                <p class="eyebrow">Administration</p>
                <h1>Doctor directory</h1>
                <p>Manage clinic doctors, specialties, and appointment availability.</p>
            </div>
            <button id="addDoctorButton" class="primary-button" type="button">Add doctor</button>
        </section>

        <section class="dashboard-panel" aria-labelledby="doctorDirectoryTitle">
            <div class="panel-heading">
                <div>
                    <h2 id="doctorDirectoryTitle">All doctors</h2>
                    <p id="doctorCount" class="muted-text" aria-live="polite">Loading doctors...</p>
                </div>
            </div>

            <div class="filter-grid" role="search">
                <label class="field-group field-group-wide" for="searchBar">
                    <span>Search by name</span>
                    <input id="searchBar" type="search" placeholder="Enter a doctor's name"
                           autocomplete="off">
                </label>

                <label class="field-group" for="filterTime">
                    <span>Availability</span>
                    <select id="filterTime">
                        <option value="">Any time</option>
                        <option value="AM">Morning</option>
                        <option value="PM">Afternoon</option>
                    </select>
                </label>

                <label class="field-group" for="filterSpecialty">
                    <span>Specialty</span>
                    <select id="filterSpecialty">
                        <option value="">All specialties</option>
                        <option value="Cardiology">Cardiology</option>
                        <option value="Dermatology">Dermatology</option>
                        <option value="Neurology">Neurology</option>
                        <option value="Pediatrics">Pediatrics</option>
                        <option value="Orthopedics">Orthopedics</option>
                        <option value="Dentistry">Dentistry</option>
                        <option value="General Physician">General physician</option>
                    </select>
                </label>

                <button id="clearDoctorFilters" class="secondary-button filter-clear" type="button">
                    Clear filters
                </button>
            </div>

            <div id="adminStatus" class="status-message" role="status" aria-live="polite"></div>
            <div id="content" class="doctor-grid" aria-live="polite"></div>
        </section>
    </main>
</div>

<div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"
     aria-hidden="true">
    <div class="modal-content">
        <button id="closeModal" class="modal-close" type="button" aria-label="Close modal">&times;</button>
        <div id="modal-body"></div>
    </div>
</div>
</body>
</html>
