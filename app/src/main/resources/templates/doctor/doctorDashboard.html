<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}"
          href="/assets/images/logo/logo.png">
    <title>Doctor Dashboard | Clinic CMS</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" href="/assets/css/style.css">
    <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}"
          href="/assets/css/doctorDashboard.css">
    <script th:src="@{/js/util.js}" src="/js/util.js" defer></script>
    <script th:src="@{/js/render.js}" src="/js/render.js" defer></script>
    <script th:src="@{/js/components/header.js}" src="/js/components/header.js" defer></script>
    <script type="module" th:src="@{/js/doctorDashboard.js}" src="/js/doctorDashboard.js"></script>
</head>
<body>
<div class="page-shell">
    <div id="header"></div>

    <main class="dashboard-main">
        <section class="dashboard-hero doctor-hero">
            <div>
                <p class="eyebrow">Clinical workspace</p>
                <h1>Appointments</h1>
                <p>Review patient details, prescription history, and today's schedule.</p>
            </div>
            <div class="hero-stat">
                <strong id="appointmentCount">0</strong>
                <span>appointments shown</span>
            </div>
        </section>

        <section class="dashboard-panel" aria-labelledby="appointmentsTitle">
            <div class="panel-heading">
                <div>
                    <h2 id="appointmentsTitle">Patient appointments</h2>
                    <p class="muted-text">Select a date or search by patient name.</p>
                </div>
                <button id="todayButton" class="secondary-button" type="button">Today</button>
            </div>

            <div class="appointment-filters" role="search">
                <label class="field-group field-group-wide" for="searchBar">
                    <span>Patient name</span>
                    <input id="searchBar" type="search" placeholder="Search appointments"
                           autocomplete="off">
                </label>
                <label class="field-group" for="datePicker">
                    <span>Appointment date</span>
                    <input id="datePicker" type="date">
                </label>
            </div>

            <div id="doctorStatus" class="status-message" role="status" aria-live="polite"></div>

            <div class="table-container">
                <table id="patientTable">
                    <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Contact</th>
                        <th>Appointment</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="patientTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
