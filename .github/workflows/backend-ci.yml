name: Backend CI

on:
  push:
  pull_request:

jobs:
  lint-and-compile-backend:
    name: Checkstyle and Maven Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: app/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check -B

      - name: Compile backend
        run: ./mvnw clean compile -DskipTests -B
